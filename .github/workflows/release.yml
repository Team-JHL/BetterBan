name: BetterBan Release

on:
  push:
    branches:
      - master

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build with Gradle
        run: ./gradlew clean shadowJar

      - name: Find JAR
        id: jar
        run: |
          echo "JAR=$(ls build/libs/*.jar | head -n 1)" >> $GITHUB_OUTPUT

      - name: Extract version from CHANGELOG
        id: vars
        run: |
          VERSION=$(grep -m1 '^## ' CHANGELOG.md | sed 's/^## //')
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT

      - name: Extract latest changelog (Markdown + HTML)
        id: changelog
        run: |
          awk '
            BEGIN { printing=0; section=0 }

            /^##[[:space:]]/ {
              section++
              if (section == 1) {
                printing=1
                next
              }
              if (section == 2) {
                printing=0
              }
            }

            printing==1 { print }
          ' CHANGELOG.md > latest.md

          # ---------------------------
          # Markdown output
          # ---------------------------
          {
            echo "MARKDOWN<<EOF"
            cat latest.md
            echo "EOF"
          } >> $GITHUB_OUTPUT

          # ---------------------------
          # HTML output (CurseForge fix)
          # ---------------------------
          echo "<ul>" > latest.html

          while IFS= read -r line; do
            line="$(echo "$line" | sed 's/^ *//;s/ *$//')"

            if [[ "$line" == "- "* ]]; then
              content="${line#- }"
              content="${content//&/&amp;}"
              content="${content//</&lt;}"
              content="${content//>/&gt;}"
              echo "  <li>$content</li>" >> latest.html
            fi
          done < latest.md

          echo "</ul>" >> latest.html

          # export HTML
          {
            echo "HTML<<EOF"
            cat latest.html
            echo "EOF"
          } >> $GITHUB_OUTPUT

      - name: Publish Modrinth + CurseForge
        uses: Kir-Antipov/mc-publish@v3
        with:
          modrinth-id: 6uy2R9cW
          modrinth-token: ${{ secrets.MODRINTH_TOKEN }}

          curseforge-id: 1386682
          curseforge-token: ${{ secrets.CURSEFORGE_TOKEN }}

          files: ${{ steps.jar.outputs.JAR }}

          name: BetterBan ${{ steps.vars.outputs.VERSION }}
          version: ${{ steps.vars.outputs.VERSION }}

          # Modrinth + GitHub
          changelog: ${{ steps.changelog.outputs.MARKDOWN }}

          # CurseForge HTML fix
          curseforge-changelog: ${{ steps.changelog.outputs.HTML }}

          loaders: |
            paper
            spigot
            bukkit
            purpur
            folia

          game-versions: |
            1.8.8
            1.9.X
            1.10.X
            1.11.X
            1.12.X
            1.13.X
            1.14.X
            1.15.X
            1.16.X
            1.17.X
            1.18.X
            1.19.X
            1.20.X
            1.21.X
            26.1.X
            26.2

      - name: GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.vars.outputs.VERSION }}
          name: BetterBan ${{ steps.vars.outputs.VERSION }}
          body: ${{ steps.changelog.outputs.MARKDOWN }}
          files: ${{ steps.jar.outputs.JAR }}